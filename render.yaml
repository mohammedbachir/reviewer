services:
  - type: worker
    name: findleads-scraper
    env: docker
    dockerfilePath: Dockerfile
    plan: free
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      - key: OPENROUTER_API_KEY
        sync: false
      - key: GMAIL_USER
        sync: false
      - key: GMAIL_PASS
        sync: false
