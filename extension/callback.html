<!DOCTYPE html>
<html>
<head>
  <title>Reviewer — Auth</title>
</head>
<body>
  <p>Completing sign-in...</p>
  <script>
    // Extract tokens from URL hash or query params
    const rawHash = window.location.hash.substring(1);
    const rawQuery = window.location.search.substring(1);
    const combined = rawHash || rawQuery;
    const params = new URLSearchParams(combined);
    const accessToken = params.get('access_token');
    const refreshToken = params.get('refresh_token');

    if (accessToken && refreshToken) {
      chrome.runtime.sendMessage({
        type: 'AUTH_SUCCESS',
        payload: { accessToken, refreshToken }
      }, (response) => {
        if (chrome.runtime.lastError || !response?.ok) {
          document.body.innerHTML = '<p>Failed to save session. Please try again.</p>';
        } else {
          document.body.innerHTML = '<p>Sign-in successful! You can close this tab.</p>';
          setTimeout(() => window.close(), 1500);
        }
      });
    } else {
      document.body.innerHTML = '<p>Sign-in failed — no tokens received. Please try again.</p>';
    }
  </script>
</body>
</html>
