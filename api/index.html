<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FindLeads</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: monospace; background: #0f172a; color: #22d3ee; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .container { text-align: center; max-width: 600px; padding: 40px; }
        h1 { font-size: 2.5rem; margin-bottom: 10px; }
        .status { color: #4ade80; font-size: 1.2rem; margin: 20px 0; }
        .links { margin-top: 30px; }
        .links a { color: #22d3ee; text-decoration: none; margin: 0 15px; }
        .links a:hover { text-decoration: underline; }
        .footer { color: #64748b; margin-top: 40px; font-size: 0.8rem; }
    </style>
</head>
<body>
    <div class="container">
        <h1>FindLeads</h1>
        <p class="status">Engine is Alive</p>
        <div class="links">
            <a href="/api/scrape?key=SECRET_KEY">/api/scrape</a>
            <a href="/api/scrape?key=SECRET_KEY&path=/health">/health</a>
            <a href="/api/scrape?key=SECRET_KEY&path=/stats">/stats</a>
        </div>
        <p class="footer">Powered by Anbar</p>
    </div>
</body>
</html>
