name: FindLeads — Data Merge (All Platforms)

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  merge-all-platforms:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 3

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install DuckDB
        run: pip install duckdb

      - name: Download latest artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          merge-multiple: true
        continue-on-error: true

      - name: Merge & Deduplicate
        run: |
          python -c "
          import duckdb, glob, os, json

          db_path = 'lead-generator/data.duckdb'
          conn = duckdb.connect(db_path)

          # Ensure schema
          try:
              conn.execute('CREATE SEQUENCE IF NOT EXISTS node_id_seq START 1')
          except: pass

          try:
              cols = [r[1] for r in conn.execute('DESCRIBE businesses').fetchall()]
              if 'email' not in cols:
                  conn.execute(\"ALTER TABLE businesses ADD COLUMN email TEXT DEFAULT ''\")
          except: pass

          # Merge artifact databases
          merged = 0
          for artifact_db in glob.glob('artifacts/**/data.duckdb', recursive=True):
              if artifact_db == db_path:
                  continue
              print(f'Merging: {artifact_db}')
              try:
                  src = duckdb.connect(artifact_db, read_only=True)
                  rows = src.execute('SELECT * FROM businesses').fetchall()
                  cols = [d[0] for d in src.description]
                  for row in rows:
                      data = dict(zip(cols, row))
                      try:
                          # Upsert: check if exists by name+city
                          existing = conn.execute(
                              'SELECT id FROM businesses WHERE name = ? AND city = ?',
                              [data.get('name'), data.get('city')]
                          ).fetchone()
                          if not existing:
                              conn.execute('''INSERT INTO businesses
                                  (name, city, sector, country, rating, review_count,
                                   website, email, phone, address, google_url, category,
                                   response_rate, unanswered_reviews, target_priority,
                                   health_score, osint_data)
                                  VALUES (?, ?, ?, ?, ?, ?, ?, ?, ?, ?, ?, ?, ?, ?, ?, ?, ?)
                              ''', [
                                  data.get('name'), data.get('city'), data.get('sector'),
                                  data.get('country', 'UAE'), data.get('rating', 0),
                                  data.get('review_count', 0), data.get('website', ''),
                                  data.get('email', ''), data.get('phone', ''),
                                  data.get('address', ''), data.get('google_url', ''),
                                  data.get('category', ''), data.get('response_rate', 0),
                                  data.get('unanswered_reviews', 0),
                                  data.get('target_priority', 'low'),
                                  data.get('health_score', 50),
                                  data.get('osint_data', '{}'),
                              ])
                              merged += 1
                      except Exception as e:
                          if 'Duplicate' not in str(e):
                              pass
                  src.close()
              except Exception as e:
                  print(f'  Skip: {e}')

          # Final stats
          total = conn.execute('SELECT COUNT(*) FROM businesses').fetchone()[0]
          cities = conn.execute('SELECT COUNT(DISTINCT city) FROM businesses').fetchone()[0]
          sectors = conn.execute('SELECT COUNT(DISTINCT sector) FROM businesses').fetchone()[0]
          snaps = conn.execute('SELECT COUNT(*) FROM snapshots').fetchone()[0]
          emails = conn.execute(\"SELECT COUNT(*) FROM businesses WHERE email != ''\").fetchone()[0]

          print(f'')
          print(f'=== DATA MERGE COMPLETE ===')
          print(f'  Total businesses: {total}')
          print(f'  New records merged: {merged}')
          print(f'  Cities: {cities}')
          print(f'  Sectors: {sectors}')
          print(f'  Emails found: {emails}')
          print(f'  Snapshots: {snaps}')
          print(f'  DB size: {round(os.path.getsize(db_path) / 1024 / 1024, 2)} MB')
          conn.close()
          "

      - name: Commit merged database
        run: |
          git config user.name "Data Merge Bot"
          git config user.email "merge-bot@users.noreply.github.com"
          git add lead-generator/data.duckdb
          git diff --cached --quiet || git commit -m "chore: daily data merge [auto] ${{ github.run_number }}"
          git push
