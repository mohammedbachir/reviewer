<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reviewer — Checkout</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #F9FAFB;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      color: #1F2937;
    }
    .container { text-align: center; padding: 2rem; }
    h1 { font-size: 1.5rem; margin-bottom: 0.5rem; }
    p { color: #6B7280; margin-bottom: 1rem; }
    .spinner {
      width: 32px; height: 32px;
      border: 3px solid #E5E7EB;
      border-top-color: #1F2937;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 1rem auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #error-msg { color: #DC2626; display: none; }
    #debug { color: #9CA3AF; font-size: 12px; margin-top: 2rem; text-align: left; max-width: 400px; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Reviewer</h1>
    <div id="loading">
      <div class="spinner"></div>
      <p>Opening checkout...</p>
    </div>
    <div id="error-msg"><p>Could not open checkout.</p></div>
    <div id="debug"></div>
  </div>

  <script src="https://sandboxcdn.paddle.com/paddle/paddle.js"></script>
  <script>
    var log = '';
    function debug(msg) { log += msg + '\n'; document.getElementById('debug').textContent = log; }

    function showError() {
      document.getElementById('loading').style.display = 'none';
      document.getElementById('error-msg').style.display = 'block';
    }

    var params = new URLSearchParams(window.location.search);
    var txnId = params.get('_ptxn');
    debug('Transaction: ' + (txnId || 'NONE'));

    if (!txnId) { showError(); return; }

    if (typeof Paddle === 'undefined') {
      debug('ERROR: Paddle.js not loaded');
      showError();
      return;
    }

    debug('Paddle loaded: v' + (Paddle.version || 'unknown'));

    Paddle.Setup({
      seller: 75274,
      checkout: { shareRevenue: false }
    });
    debug('Paddle.Setup done');

    Paddle.Checkout.open({ transactionId: txnId });
    debug('Checkout.open called');
  </script>
</body>
</html>
