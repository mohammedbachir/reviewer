<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reviewer — Checkout</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #F9FAFB;
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; color: #1F2937;
    }
    .container { text-align: center; padding: 2rem; }
    h1 { font-size: 1.5rem; margin-bottom: 0.5rem; }
    p { color: #6B7280; margin-bottom: 1rem; }
    .spinner {
      width: 32px; height: 32px;
      border: 3px solid #E5E7EB; border-top-color: #1F2937;
      border-radius: 50%; animation: spin 0.8s linear infinite; margin: 1rem auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #error-msg { color: #DC2626; display: none; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Reviewer</h1>
    <div id="loading">
      <div class="spinner"></div>
      <p>Opening checkout...</p>
    </div>
    <div id="error-msg"><p>Could not open checkout. Please close this tab and try again.</p></div>
  </div>

  <script src="https://sandbox-cdn.paddle.com/paddle/paddle.js"></script>
  <script>
    (function() {
      var params = new URLSearchParams(window.location.search);
      var txnId = params.get('_ptxn');

      if (!txnId || typeof Paddle === 'undefined') {
        document.getElementById('loading').style.display = 'none';
        document.getElementById('error-msg').style.display = 'block';
        return;
      }

      Paddle.Setup({ seller: 75274 });
      Paddle.Checkout.open({ transactionId: txnId });
    })();
  </script>
</body>
</html>
