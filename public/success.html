<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reviewer — Payment Successful</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #F9FAFB;
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; color: #1F2937;
    }
    .container { text-align: center; padding: 2rem; max-width: 400px; }
    .check-circle {
      width: 80px; height: 80px; border-radius: 50%; background: #ECFDF5;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 1.5rem;
    }
    h1 { font-size: 1.5rem; margin-bottom: 0.5rem; color: #059669; }
    p { color: #374151; margin-bottom: 0.75rem; line-height: 1.6; }
    .subtext { color: #6B7280; font-size: 0.85rem; }
    .btn {
      display: inline-block; margin-top: 1.5rem;
      padding: 0.75rem 1.5rem; background: #1F2937; color: #fff;
      border: none; border-radius: 8px; font-size: 0.9rem;
      cursor: pointer; text-decoration: none;
    }
    .btn:hover { background: #111827; }
  </style>
</head>
<body>
  <div class="container">
    <div class="check-circle">
      <svg width="40" height="40" viewBox="0 0 40 40" fill="none">
        <path d="M12 20l6 6 10-10" stroke="#059669" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <h1>Payment Successful!</h1>
    <p>You now have <strong>unlimited replies</strong> to all your Google reviews.</p>
    <p class="subtext">Open the Reviewer extension and start replying to reviews.</p>
    <a class="btn" href="https://www.google.com/maps" target="_self">Go to Google Maps</a>
  </div>
</body>
</html>
